<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 180px; font-family: sans-serif; padding: 10px; background: #111; color: white; }
    h3 { font-size: 14px; margin-top: 0; color: #00ff00; }
    .toggle { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
    input { margin-right: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>Auto Settings</h3>
  <label class="toggle"><input type="checkbox" id="skipIntro" checked> Skip Intro</label>
  <label class="toggle"><input type="checkbox" id="skipOutro" checked> Skip Outro</label>
  <label class="toggle"><input type="checkbox" id="autoNext" checked> Auto Next</label>

  <script src="popup.js"></script>
</body>
</html>
